<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks - Flowing Soft</title>
    <style>
        :root {
            --ink: #101214;
            --muted: #5b5b55;
            --paper: #f5f0e6;
            --sage: #4b5548;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, var(--paper) 0%, #fbf7ee 100%);
            color: var(--ink);
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        main {
            width: min(100%, 680px);
            border: 1px solid rgba(16, 18, 20, 0.14);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            padding: clamp(28px, 6vw, 52px);
            box-shadow: 0 24px 70px rgba(16, 18, 20, 0.12);
        }

        img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            margin-bottom: 26px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2.4rem, 8vw, 4.4rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 1.08rem;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--ink);
            color: var(--white);
            text-decoration: none;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <main>
        <img src="flowing_soft_logo.png" alt="">
        <h1>You're on the list.</h1>
        <p>Thanks for your interest in The Minimal Flow. Flowing Soft will use your email for tester access and launch updates.</p>
        <a href="/#products">Back to products</a>
    </main>
</body>
</html>
